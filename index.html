<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FullBrainRot — Real Clip Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">🧠 FullBrainRot</div>
    <input id="searchInput" class="search" type="text" placeholder="ค้นหา username หรือ caption...">
    <button id="refreshBtn" class="refresh-btn">🔄 โหลดคลิปใหม่</button>
    <button id="bookmarksBtn" class="refresh-btn">🔖 บุ๊คมาร์ค</button>
    <div class="counter"><span id="statusText">กำลังโหลด...</span> โหลดแล้ว <span id="loadedCount">0</span> คลิป</div>
  </header>

  <div id="tagBar" class="tag-bar hidden"></div>

  <main id="grid" class="grid"></main>

  <div id="sentinel" class="sentinel"></div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-player">
      <button id="closeModal" class="close-btn">&times;</button>
      <button id="modalBookmarkBtn" class="bookmark-btn modal-bookmark-btn">🔖</button>
      <button id="prevBtn" class="nav-btn prev">&#8249;</button>
      <video id="modalVideo" class="modal-video hidden" loop playsinline></video>
      <iframe id="modalIframe" class="modal-video hidden" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <div class="modal-info">
        <div class="modal-user">@<span id="modalUsername"></span></div>
        <div class="modal-caption" id="modalCaption"></div>
        <div class="modal-stats">
          <span>❤️ <span id="modalLikes"></span></span>
          <span>💬 <span id="modalComments"></span></span>
          <span>👁️ <span id="modalShares"></span></span>
        </div>
      </div>
      <button id="nextBtn" class="nav-btn next">&#8250;</button>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
